# ==============================
# THÔNG TIN ỨNG DỤNG
# ==============================
spring.application.name=cinema-management
server.port=8080

# ==============================
# CẤU HÌNH DATABASE
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/cinema?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# CẤU HÌNH JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jackson.serialization.fail-on-empty-beans=false

# ==============================
# JWT CONFIG
# ==============================
# Secret cần >= 32 ký tự để tránh WeakKeyException
jwt.secret=${JWT_SECRET:dev-only-change-this-jwt-secret-key-2026-very-long}
jwt.expiration=1800000
jwt.refresh-expiration=604800000

# ==============================
# CẤU HÌNH CORS CHO FRONTEND VUE
# ==============================
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ==============================
# CẤU HÌNH VNPAY
# ==============================
vnp_TmnCode=${VNP_TMN_CODE}
vnp_HashSecret=${VNP_HASH_SECRET}
vnp_Url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnp_ReturnUrl=${VNP_RETURN_URL:http://192.168.0.101:8080/api/payments/vnpay-return}
# vnp_ReturnUrl=http://localhost:5173/payment-result

# ==============================
# KHÁC
# ==============================
app.seed.enabled=false

# ==============================
# EMAIL OTP CONFIG
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

otp.expiration-minutes=5
otp.resend-cooldown-seconds=30

# Bật log chi tiết cho Spring Security (chỉ nên bật khi debug)
logging.level.org.springframework.security=TRACE

# ==============================
# CINEMA BOT / OLLAMA CONFIG
# ==============================
cinema.bot.ollama-url=${CINEMA_BOT_OLLAMA_URL:http://localhost:11434/api/chat}
cinema.bot.model=${CINEMA_BOT_MODEL:cinema-bot}
cinema.bot.embedding-url=${CINEMA_BOT_EMBEDDING_URL:http://localhost:8002/embed}
cinema.bot.embedding-model=${CINEMA_BOT_EMBEDDING_MODEL:BAAI/bge-m3}
cinema.bot.embedding-connect-timeout-seconds=${CINEMA_BOT_EMBEDDING_CONNECT_TIMEOUT_SECONDS:10}
cinema.bot.embedding-read-timeout-seconds=${CINEMA_BOT_EMBEDDING_READ_TIMEOUT_SECONDS:180}
cinema.bot.qdrant.enabled=${CINEMA_BOT_QDRANT_ENABLED:true}
cinema.bot.qdrant.url=${CINEMA_BOT_QDRANT_URL:http://localhost:6333}
cinema.bot.qdrant.collection=${CINEMA_BOT_QDRANT_COLLECTION:cinema_bot_documents_bge_m3}
cinema.movie-discovery.embedding-enabled=${CINEMA_MOVIE_DISCOVERY_EMBEDDING_ENABLED:true}
cinema.movie-discovery.ai-autostart-enabled=${CINEMA_MOVIE_DISCOVERY_AI_AUTOSTART_ENABLED:true}
cinema.movie-discovery.ai-python-command=${CINEMA_MOVIE_DISCOVERY_AI_PYTHON_COMMAND:python}
cinema.movie-discovery.ai-service-dir=${CINEMA_MOVIE_DISCOVERY_AI_SERVICE_DIR:../ai-services/movie-discovery}
cinema.movie-discovery.ai-host=${CINEMA_MOVIE_DISCOVERY_AI_HOST:127.0.0.1}
cinema.movie-discovery.ai-port=${CINEMA_MOVIE_DISCOVERY_AI_PORT:8002}
cinema.movie-discovery.ai-health-url=${CINEMA_MOVIE_DISCOVERY_AI_HEALTH_URL:http://localhost:8002/health}
cinema.movie-discovery.ai-warmup-enabled=${CINEMA_MOVIE_DISCOVERY_AI_WARMUP_ENABLED:true}
cinema.movie-discovery.ai-warmup-url=${CINEMA_MOVIE_DISCOVERY_AI_WARMUP_URL:http://localhost:8002/warmup}
cinema.movie-discovery.ai-cache-root=${CINEMA_MOVIE_DISCOVERY_AI_CACHE_ROOT:D:/AI_CACHE}
cinema.movie-discovery.rerank-enabled=${CINEMA_MOVIE_DISCOVERY_RERANK_ENABLED:true}
cinema.movie-discovery.rerank-url=${CINEMA_MOVIE_DISCOVERY_RERANK_URL:http://localhost:8002/rerank-movies}
cinema.movie-discovery.rerank-model=${CINEMA_MOVIE_DISCOVERY_RERANK_MODEL:BAAI/bge-reranker-v2-m3}
cinema.movie-discovery.rerank-candidate-limit=${CINEMA_MOVIE_DISCOVERY_RERANK_CANDIDATE_LIMIT:5}
cinema.movie-discovery.rerank-connect-timeout-seconds=${CINEMA_MOVIE_DISCOVERY_RERANK_CONNECT_TIMEOUT_SECONDS:10}
cinema.movie-discovery.rerank-read-timeout-seconds=${CINEMA_MOVIE_DISCOVERY_RERANK_READ_TIMEOUT_SECONDS:180}

# ==============================
# REVIEW AI MODERATION CONFIG
# ==============================
review.moderation.provider=${REVIEW_MODERATION_PROVIDER:rule}
review.moderation.http-url=${REVIEW_MODERATION_HTTP_URL:http://localhost:8001/moderate-review}
review.moderation.ollama-url=${REVIEW_MODERATION_OLLAMA_URL:${cinema.bot.ollama-url}}
review.moderation.ollama-model=${REVIEW_MODERATION_OLLAMA_MODEL:${cinema.bot.model}}
