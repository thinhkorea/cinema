spring.application.name=cinema-management

spring.datasource.url=jdbc:mysql://localhost:3306/cinema?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=111111

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Bật debug cho Spring Security
# logging.level.org.springframework.security=DEBUG

# Nếu muốn log chi tiết hơn (nhiều hơn cả DEBUG, chỉ nên bật khi test)
logging.level.org.springframework.security=TRACE

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always